<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Stock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .menu {
            display: flex;
            gap: 20px;
        }
        a {
            text-decoration: none;
        }
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            width: 200px;
            text-align: center;
            background: #f9f9f9;
            cursor: pointer;
        }
        .card:hover {
            background: #eaeaea;
        }
    </style>
</head>
<body>

<h1>Sistema de Stock y Ventas</h1>

<div class="menu">
    <a href="/web">
        <div class="card">
            <h3>Productos</h3>
            <p>ABM y stock</p>
        </div>
    </a>

    <a href="/ventas-web">
        <div class="card">
            <h3>Nueva Venta</h3>
            <p>Registrar ventas</p>
        </div>
    </a>

    <a href="/historial-web">
        <div class="card">
            <h3>Historial</h3>
            <p>Ver ventas</p>
        </div>
    </a>

    <a href="/stock-web">
    <div class="card">
        <h3>Ingreso de Stock</h3>
        <p>Compras y ajustes</p>
    </div>
    </a>

    <a href="/configuracion">
    <div class="card">
        <h3>Configuración</h3>
        <p>Categorías y ajustes</p>
    </div>
</a>
    
</div>

</body>
</html>
