<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 30px;
}

input {
    padding: 6px;
    font-size: 14px;
}

/* =========================
   BÚSQUEDA
========================= */
#busqueda {
    width: 400px;
}

#resultados {
    border: 1px solid #ccc;
    max-width: 420px;
    list-style: none;
    padding: 0;
    margin-top: 5px;
}
#resultados li {
    padding: 6px;
    cursor: pointer;
}
#resultados li:hover {
    background: #eee;
}

/* =========================
   TABLA
========================= */
table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
}
th {
    background: #f4f4f4;
}
th.num, td.num {
    text-align: right;
}

/* =========================
   FOOTER
========================= */
tfoot td {
    font-weight: bold;
    background: #fafafa;
}

/* quitar flechas number */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
    text-align: right;
}
</style>
</head>

<body>

<h1>Nueva Venta</h1>

<input
    id="busqueda"
    type="text"
    placeholder="Buscar producto por nombre o código"
    autocomplete="off"
/>

<ul id="resultados"></ul>

<table>
<thead>
<tr>
    <th>Producto</th>
    <th class="num">Precio</th>
    <th class="num">Cantidad</th>
    <th class="num">Subtotal</th>
</tr>
</thead>

<tbody id="detalle"></tbody>

<tfoot>
<tr>
    <td colspan="3">Total</td>
    <td class="num">$<span id="total">0.00</span></td>
</tr>
</tfoot>
</table>

<button onclick="confirmarVenta()">Confirmar venta</button>
