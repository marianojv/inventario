<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        input {
            padding: 6px;
            width: 400px;
        }
        #resultados {
            list-style: none;
            padding: 0;
            margin-top: 5px;
            border: 1px solid #ccc;
            max-width: 420px;
        }
        #resultados li {
            padding: 6px;
            cursor: pointer;
        }
        #resultados li:hover {
            background-color: #eee;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
        th {
            background-color: #f4f4f4;
        }
        .total {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Nueva Venta</h1>

<input
    id="busqueda"
    type="text"
    placeholder="Buscar producto por nombre o código"
    autocomplete="off"
/>

<ul id="resultados"></ul>

<table>
    <thead>
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
        </tr>
    </thead>
    <tbody id="detalle"></tbody>
</table>

<div class="total">
    Total: $<span id="total">0.00</span>
</div>

<button onclick="confirmarVenta()">Confirmar venta</button>

<script>
const buscarUrl = "http://127.0.0.1:8000/productos/buscar";
const ventasUrl = "http://127.0.0.1:8000/ventas";

let detalles = [];
let timeout = null;

const inputBusqueda = document.getElementById("busqueda");
const listaResultados = document.getElementById("resultados");
const detalleTabla = document.getElementById("detalle");
const totalSpan = document.getElementById("total");

/* =========================
   BÚSQUEDA TIPO POS
========================= */

inputBusqueda.addEventListener("input", () => {
    clearTimeout(timeout);
    const q = inputBusqueda.value.trim();

    if (q.length < 2) {
        listaResultados.innerHTML = "";
        return;
    }

    timeout = setTimeout(() => buscar(q), 300);
});

async function buscar(q) {
    const res = await fetch(`${buscarUrl}?q=${encodeURIComponent(q)}`);
    const productos = await res.json();

    listaResultados.innerHTML = "";

    productos.forEach(p => {
        const li = document.createElement("li");
        li.textContent =
            `${p.codigo ?? ""} ${p.nombre} - $${p.precio} (Stock: ${p.stock})`;

        li.onclick = () => seleccionarProducto(p);
        listaResultados.appendChild(li);
    });
}

/* =========================
   CARRITO
========================= */

function seleccionarProducto(p) {
    const enCarrito = detalles.find(d => d.producto_id === p.id);
    const cantidadActual = enCarrito ? enCarrito.cantidad : 0;

    if (cantidadActual + 1 > p.stock) {
        alert("No hay stock disponible");
        return;
    }

    if (enCarrito) {
        enCarrito.cantidad += 1;
    } else {
        detalles.push({
            producto_id: p.id,
            nombre: p.nombre,
            precio: p.precio,
            cantidad: 1
        });
    }

    renderDetalle();

    inputBusqueda.value = "";
    listaResultados.innerHTML = "";
    inputBusqueda.focus();
}

function renderDetalle() {
    detalleTabla.innerHTML = "";
    let total = 0;

    detalles.forEach(d => {
        const subtotal = d.cantidad * d.precio;
        total += subtotal;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${d.nombre}</td>
            <td>$${d.precio.toFixed(2)}</td>
            <td>${d.cantidad}</td>
            <td>$${subtotal.toFixed(2)}</td>
        `;
        detalleTabla.appendChild(tr);
    });

    totalSpan.textContent = total.toFixed(2);
}

/* =========================
   CONFIRMAR VENTA
========================= */

async function confirmarVenta() {
    if (detalles.length === 0) {
        alert("No hay productos en la venta");
        return;
    }

    const payload = {
        detalles: detalles.map(d => ({
            producto_id: d.producto_id,
            cantidad: d.cantidad
        }))
    };

    const res = await fetch(ventasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!res.ok) {
        alert("Error al registrar la venta");
        return;
    }

    const data = await res.json();
    alert(`Venta registrada. Total: $${data.total}`);

    location.reload();
}
</script>

</body>
</html>
