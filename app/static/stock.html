<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Ingreso de Stock</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

/* =========================
   RIBBON SUPERIOR
========================= */
.ribbon {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background-color: #f4f4f4;
    border-bottom: 1px solid #ccc;
}

.ribbon button {
    padding: 6px 12px;
    cursor: pointer;
}

/* =========================
   CONTENIDO
========================= */
.container {
    padding: 30px;
}

h1 {
    margin-bottom: 25px;
}

/* =========================
   FORMULARIO
========================= */
.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    align-items: center;
}

.form-row label {
    width: 120px;
}

input, select {
    padding: 6px;
    font-size: 14px;
}

/* tamaños específicos */
#categoria {
    width: 250px;
}

#nombre {
    width: 350px;
}

#precio {
    width: 150px;
}

#stock {
    width: 80px;
}

button.primary {
    padding: 8px 16px;
    font-size: 14px;
}

/* quitar flechas en inputs tipo number */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type=number] {
    -moz-appearance: textfield;
}
</style>
</head>

<body>

<!-- =========================
     RIBBON
========================= -->
<div class="ribbon">
    <button onclick="volver()">⬅ Volver</button>
    <!-- espacio reservado para futuras acciones -->
    <!-- <button>Imprimir</button> -->
</div>

<!-- =========================
     CONTENIDO
========================= -->
<div class="container">

<h1>Ingreso de Stock</h1>

<div class="form-row">
    <label>Categoría</label>
    <input list="categorias" id="categoria" placeholder="Buscar categoría..." />
    <datalist id="categorias"></datalist>
</div>

<div class="form-row">
    <label>Nombre</label>
    <input id="nombre" type="text" />
</div>

<div class="form-row">
    <label>Precio</label>
    <input id="precio" type="number" step="0.01" />
</div>

<div class="form-row">
    <label>Stock inicial</label>
    <input id="stock" type="number" min="0" />
</div>

<div class="form-row">
    <button class="primary" onclick="guardar()">Añadir</button>
</div>

</div>

<script>
const categoriasUrl = "http://127.0.0.1:8000/categorias";

/* =========================
   CARGA DE CATEGORÍAS
========================= */

async function cargarCategorias() {
    const res = await fetch(categoriasUrl);
    const categorias = await res.json();

    const datalist = document.getElementById("categorias");
    datalist.innerHTML = "";

    categorias.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.nombre;
        opt.dataset.id = c.id;
        datalist.appendChild(opt);
    });
}

/* =========================
   GUARDAR (placeholder)
   (hook futuro con backend)
========================= */

function guardar() {
    alert("Guardar pendiente de lógica de backend");
}

/* =========================
   NAVEGACIÓN
========================= */

function volver() {
    window.location.href = "/";
}

cargarCategorias();
</script>

</body>
</html>
